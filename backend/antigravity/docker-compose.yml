version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: antigravity
      POSTGRES_PASSWORD: password
      POSTGRES_DB: antigravity_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U antigravity -d antigravity_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ingestor:
    build: ./ingestor
    ports:
      - "8000:8000"
    environment:
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy

  brain:
    build: ./brain_service
    environment:
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      - PG_HOST=postgres
      - POSTGRES_USER=antigravity
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=antigravity_db
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  engine:
    build: ./gti_engine
    ports:
      - "4000:4000"
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
